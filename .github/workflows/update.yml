name: daily-update

on:
  schedule:
    - cron: "5 12 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: daily update
        env:
          PCF_URL: ${{ vars.PCF_URL }}
          ALLIANZ_PCF_URL: ${{ vars.ALLIANZ_PCF_URL }}
        run: python scripts/update.py

      - name: commit results
        run: |
          git config user.name "signal-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "daily update $(date +'%Y-%m-%d')"
          git push
